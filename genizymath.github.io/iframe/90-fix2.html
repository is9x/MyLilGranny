<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity WebGL Player | Granny</title>

  <script src="../../cdn.jsdelivr.net/gh/web-ports/granny@main/TemplateData/UnityProgress.js"></script>
  <script src="../../cdn.jsdelivr.net/gh/web-ports/granny@main/Build/UnityLoader.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #unityContainer {
      width: 100vw;
      height: 100vh;
    }

    #loading-text {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      font-size: 38px;
      font-family: cursive;
      font-weight: bold;
      text-align: center;
      background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow 3s ease infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes rainbow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <div id="unityContainer"></div>

  <script>
    var loadingText = document.querySelector("#loading-text");
    var loadedBytes = 0;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const result = await reader.read();
        if (result.done) break;

        received += result.value.length;
        loadedBytes += result.value.length;
        chunks.push(result.value);

        const mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        const mbTotal = "567.86";
        loadingText.textContent = "LOADING... " + mbDone + " MB / " + mbTotal + " MB";
      }

      const fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    async function mergeFiles(fileParts) {
      const buffers = await Promise.all(fileParts.map(function (part) {
        return fetchWithProgress(part);
      }));
      const mergedBlob = new Blob(buffers);
      return URL.createObjectURL(mergedBlob);
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }

    (async function () {
      const dataUrl = await mergeFiles(getParts("Build/GrannyPortButBetter.data.unityweb", 1, 29));

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url) {
        const rest = Array.prototype.slice.call(arguments, 2);
        if (typeof url === "string" && url.includes("GrannyPortButBetter.data.unityweb")) {
          url = dataUrl;
        }
        return originalOpen.call(this, method, url, ...rest);
      };

      UnityLoader.instantiate("unityContainer", "Build/GrannyPortButBetter.json", {
        onProgress: UnityProgress
      });

      loadingText.remove();
    })();
  </script>
</body>
</html>
